<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Кошик</title>
<style>
body { font-family: Arial; padding: 40px; background:#f6f6f6; }
h1 { color: #ff4d6d; text-align:center; }

/* Карточка товара */
.cart-item { 
  background: white; 
  padding: 25px; 
  margin: 15px 0; 
  border-radius: 15px; 
  display:flex; 
  align-items:center; 
  gap:20px; 
  box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.cart-item img { 
  width: 150px;  /* увеличили */
  border-radius: 10px; 
}

.cart-item-info { 
  font-size: 20px;  
}

.cart-item-controls button {
  margin-right: 8px;
  padding: 12px 18px;  
  border:none;
  border-radius:8px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  font-size:18px;
}

/* Блок общей суммы */
#total-price { 
  font-weight:bold; 
  font-size:24px; 
  margin-top:25px; 
  text-align:center;
}

/* Кнопка оформить заказ */
button#order { 
  display:block;
  margin:25px auto;
  padding:15px 30px;
  background:#ff4d6d; 
  color:white; 
  border:none; 
  border-radius:10px; 
  cursor:pointer;
  font-size:20px;
}

/* Форма заказа */
#order-form {
  display:none;
  position: relative;
  z-index: 10;
  margin-top:20px;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#order-form input, #order-form textarea, #order-form select {
  font-size:18px;  
  padding:10px;
  margin-bottom:15px;
  width:100%;
}

#order-form button {
  padding:15px 30px; 
  background:#ff4d6d; 
  color:white; 
  border:none; 
  border-radius:8px; 
  cursor:pointer;
  font-size:20px;
}

/* Мобильные экраны */
@media (max-width: 768px){
  .cart-item {
    flex-direction: column;
    align-items: center;
    text-align:center;
    padding:30px;
    gap:25px;
  }
  .cart-item img { width: 200px; }  
  .cart-item-info { font-size:24px; }  
  .cart-item-controls button { padding:18px 25px; font-size:22px; }
  #total-price { font-size:28px; }
  button#order { padding:20px 40px; font-size:24px; }
  #order-form { padding:30px; }
  #order-form input, #order-form textarea, #order-form select { font-size:20px; padding:12px; }
  #order-form button { font-size:24px; padding:20px 40px; }
}
</style>
</head>
<body>

<h1>Ваш кошик</h1>

<!-- Блок товаров -->
<div id="cart-items"></div>

<!-- Блок общей суммы -->
<div id="total-price"></div>

<!-- Кнопка открытия формы -->
<button id="order" onclick="orderCart()">Оформити замовлення</button>

<!-- Форма для оформления заказа -->
<div id="order-form">
  <h2>Введіть ваші дані</h2>
  <label>Ім'я:</label><br>
  <input type="text" id="firstName"><br>
  
  <label>Прізвище:</label><br>
  <input type="text" id="lastName"><br>
  
  <label>Телефон:</label><br>
  <input type="text" id="phone"><br>
  
  <label>Сервіс доставки:</label><br>
  <select id="deliveryService">
    <option value="">Оберіть сервіс</option>
    <option value="nova_poshta">Нова Пошта</option>
    <option value="ukr_poshta">УкрПошта</option>
  </select><br>

  <label>Відділення:</label><br>
  <input type="text" id="branch"><br>

  <label>Населений пункт:</label><br>
  <input type="text" id="city"><br>
  
  <button onclick="submitOrder()">Підтвердити замовлення</button>
</div>

<script>
// Масив товарів
let cartItems = [];
if(localStorage.getItem('cartItems')){
  cartItems = JSON.parse(localStorage.getItem('cartItems'));
}

// Показати товари в кошику
function displayCart(){
  let container = document.getElementById('cart-items');
  if(cartItems.length === 0){
    container.innerHTML = '<p>Товари поки не додані.</p>';
    updateCartCount();
    document.getElementById('total-price').innerText = '';
    return;
  }

  container.innerHTML = '';
  let totalSum = 0;

  cartItems.forEach((item, index) => {
    const itemTotal = item.price * item.qty;
    totalSum += itemTotal;

    const cartItemHTML = `
      <div class="cart-item">
        <img src="${item.img}" alt="${item.name}">
        <div class="cart-item-info">
          <b>${item.name}</b> <br>
          Ціна: ${item.price} грн<br>
          Кількість: <span id="qty-${index}">${item.qty}</span> <br>
          Сума: <span id="price-${index}">${itemTotal}</span> грн
        </div>
        <div class="cart-item-controls">
          <button onclick="changeQty(${index}, -1)">-</button>
          <button onclick="changeQty(${index}, 1)">+</button>
          <button onclick="removeItem(${index})">❌ Видалити</button>
        </div>
      </div>
    `;
    container.innerHTML += cartItemHTML;
  });

  document.getElementById('total-price').innerText = `Загальна сума: ${totalSum} грн`;
}

// Змінюємо кількість товару
function changeQty(index, delta){
  cartItems[index].qty += delta;
  if(cartItems[index].qty <= 0){
    cartItems.splice(index, 1);
  }
  localStorage.setItem('cartItems', JSON.stringify(cartItems));
  displayCart();
  updateCartCount();
}

// Видалення товару
function removeItem(index){
  cartItems.splice(index, 1);
  localStorage.setItem('cartItems', JSON.stringify(cartItems));
  displayCart();
  updateCartCount();
}

// Оновлення лічильника
function updateCartCount(){
  let total = cartItems.reduce((sum,item)=>sum+item.qty,0);
  if(document.getElementById('cart-count')){
    document.getElementById('cart-count').innerText = total;
  }
  if(window.opener && window.opener.document.getElementById('cart-count')){
    window.opener.document.getElementById('cart-count').innerText = total;
  }
}

// Показ форми оформлення замовлення
function orderCart(){
  if(cartItems.length === 0){
    alert("Ваш кошик порожній!");
    return;
  }
  const form = document.getElementById('order-form');
  form.style.display = 'block';
  form.scrollIntoView({behavior:'smooth'});
}

// Обработка отправки формы
function submitOrder(){
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const deliveryService = document.getElementById('deliveryService').value;
  const branch = document.getElementById('branch').value.trim();
  const city = document.getElementById('city').value.trim();

  if(!firstName || !lastName || !phone || !deliveryService || !branch || !city){
    alert("Будь ласка, заповніть всі поля!");
    return;
  }

  let itemsText = cartItems.map(item => 
    `Назва: ${item.name}, Кількість: ${item.qty}, Ціна за одиницю: ${item.price} грн, Сума: ${item.price*item.qty} грн`
  ).join('\n');

  const body = {
    firstName, lastName, phone, deliveryService, city, branch, items: itemsText
  };

  fetch("https://hook.eu1.make.com/35ch8ewv61k47c1spwlay6xfnqoeju7n", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  alert(`Дякуємо, ${firstName}! Ваше замовлення прийняте.
Сервіс доставки: ${deliveryService === 'nova_poshta' ? 'Нова Пошта' : 'УкрПошта'}
Відділення: ${branch}
Населений пункт: ${city}
Ми зв’яжемося з вами за телефоном ${phone}.`);

  cartItems = [];
  localStorage.removeItem('cartItems');
  displayCart();
  updateCartCount();

  document.getElementById('order-form').style.display = 'none';
}

window.onload = displayCart;
</script>
</body>
</html>
