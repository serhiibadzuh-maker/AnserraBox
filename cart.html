<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Кошик</title>
<style>
body { font-family: Arial; padding: 40px; background:#f6f6f6; }
h1 { color: #ff4d6d; }
.cart-item { 
  background: white; 
  padding: 15px; 
  margin: 10px 0; 
  border-radius: 10px; 
  display:flex; 
  align-items:center; 
  gap:15px; 
  box-shadow:0 0 5px rgba(0,0,0,0.1);
}
.cart-item img { width: 80px; border-radius: 8px; }
.cart-item-info { font-size: 16px; }
.cart-item-controls button {
  margin-right: 5px;
  padding: 5px 10px;
  border:none;
  border-radius:5px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  font-size:14px;
}
button#order { margin-top:20px; padding:10px 20px; background:#ff4d6d; color:white; border:none; border-radius:8px; cursor:pointer; }

/* Стилі форми замовлення */
#order-form {
  display:none;
  position: relative;
  z-index: 10;
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 5px rgba(0,0,0,0.1);
}
#order-form input, #order-form textarea, #order-form select {
  font-size: 14px;
  padding: 5px;
  margin-bottom:10px;
  width:100%;
}
#order-form button {
  padding:10px 20px; 
  background:#ff4d6d; 
  color:white; 
  border:none; 
  border-radius:5px; 
  cursor:pointer;
}

/* Мобільні стилі для телефонів */
@media (max-width: 768px) {
  .cart-item {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px;
    margin: 10px 5px;
  }
  .cart-item img {
    width: 100px;
    margin-bottom: 10px;
  }
  .cart-item-info {
    font-size: 16px;
    line-height: 1.5;
  }
  .cart-item-controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
  }
  .cart-item-controls button {
    padding: 8px 16px;
    font-size: 16px;
  }
  #order {
    width: 95%;
    margin: 20px auto 0 auto;
    padding: 12px 20px;
    font-size: 16px;
  }
  #order-form {
    width: 95%;
    margin: 20px auto;
    padding: 20px;
  }
  #order-form input, 
  #order-form select, 
  #order-form textarea {
    font-size: 16px;
    padding: 8px;
  }
  #total-price {
    font-size: 18px;
    margin-top: 15px;
  }
}
</style>
</head>
<body>

<h1>Ваш кошик</h1>

<!-- Блок товаров -->
<div id="cart-items"></div>

<!-- Блок общей суммы -->
<div id="total-price" style="font-weight:bold; font-size:18px; margin-top:20px;"></div>

<!-- Кнопка открытия формы -->
<button id="order" onclick="orderCart()">Оформити замовлення</button>

<!-- Форма для оформления заказа -->
<div id="order-form">
  <h2>Введіть ваші дані</h2>
  <label>Ім'я:</label><br>
  <input type="text" id="firstName"><br>
  
  <label>Прізвище:</label><br>
  <input type="text" id="lastName"><br>
  
  <label>Телефон:</label><br>
  <input type="tel" id="phone" value="+380" oninput="phoneMask(this)" maxlength="13"><br>
  
  <label>Сервіс доставки:</label><br>
  <select id="deliveryService">
    <option value="">Оберіть сервіс</option>
    <option value="nova_poshta">Нова Пошта</option>
    <option value="ukr_poshta">УкрПошта</option>
  </select><br>

  <label>Відділення:</label><br>
  <input type="text" id="branch"><br>

  <label>Населений пункт:</label><br>
  <input type="text" id="city"><br>
  
  <button onclick="submitOrder()">Підтвердити замовлення</button>
</div>

<script>
// Масив товарів
let cartItems = [];
if(localStorage.getItem('cartItems')){
  cartItems = JSON.parse(localStorage.getItem('cartItems'));
}

// Показати товари в кошику
function displayCart(){
  let container = document.getElementById('cart-items');
  if(cartItems.length === 0){
    container.innerHTML = '<p>Товари поки не додані.</p>';
    updateCartCount();
    document.getElementById('total-price').innerText = '';
    return;
  }

  container.innerHTML = '';
  let totalSum = 0;

  cartItems.forEach((item, index) => {
    const itemTotal = item.price * item.qty;
    totalSum += itemTotal;

    const cartItemHTML = `
      <div class="cart-item">
        <img src="${item.img}" alt="${item.name}">
        <div class="cart-item-info">
          <b>${item.name}</b> <br>
          Ціна: ${item.price} грн<br>
          Кількість: <span id="qty-${index}">${item.qty}</span> <br>
          Сума: <span id="price-${index}">${itemTotal}</span> грн
        </div>
        <div class="cart-item-controls">
          <button onclick="changeQty(${index}, -1)">-</button>
          <button onclick="changeQty(${index}, 1)">+</button>
          <button onclick="removeItem(${index})">❌ Видалити</button>
        </div>
      </div>
    `;
    container.innerHTML += cartItemHTML;
  });

  // Показ загальної суми
  document.getElementById('total-price').innerText = `Загальна сума: ${totalSum} грн`;
}

// Змінюємо кількість товару
function changeQty(index, delta){
  cartItems[index].qty += delta;
  if(cartItems[index].qty <= 0){
    cartItems.splice(index, 1);
  }
  localStorage.setItem('cartItems', JSON.stringify(cartItems));
  displayCart();
  updateCartCount();
}

// Видалення товару
function removeItem(index){
  cartItems.splice(index, 1);
  localStorage.setItem('cartItems', JSON.stringify(cartItems));
  displayCart();
  updateCartCount();
}

// Оновлення лічильника на головній сторінці та при відкритті кошика
function updateCartCount(){
  let total = cartItems.reduce((sum,item)=>sum+item.qty,0);
  if(document.getElementById('cart-count')){
    document.getElementById('cart-count').innerText = total;
  }
  if(window.opener && window.opener.document.getElementById('cart-count')){
    window.opener.document.getElementById('cart-count').innerText = total;
  }
}

// Маска для телефона
function phoneMask(input){
  if(!input.value.startsWith('+380')){
    input.value = '+380';
  }
  let numbers = input.value.slice(4).replace(/\D/g,'');
  input.value = '+380' + numbers;
}

// Показ форми оформлення замовлення
function orderCart(){
  if(cartItems.length === 0){
    alert("Ваш кошик порожній!");
    return;
  }
  const form = document.getElementById('order-form');
  form.style.display = 'block';
  form.scrollIntoView({behavior:'smooth'});
}

// Обработка отправки формы
function submitOrder(){
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const deliveryService = document.getElementById('deliveryService').value;
  const branch = document.getElementById('branch').value.trim();
  const city = document.getElementById('city').value.trim();

  if(!firstName || !lastName || !phone || !deliveryService || !branch || !city){
    alert("Будь ласка, заповніть всі поля!");
    return;
  }

  // Преобразуем товары в читаемый вид
  let itemsText = cartItems.map(item => 
    `Назва: ${item.name}, Кількість: ${item.qty}, Ціна за одиницю: ${item.price} грн, Сума: ${item.price*item.qty} грн`
  ).join('\n');

  const body = {
    firstName,
    lastName,
    phone,
    deliveryService,
    city,
    branch,
    items: itemsText
  };

  fetch("https://hook.eu1.make.com/35ch8ewv61k47c1spwlay6xfnqoeju7n", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  alert(`Дякуємо, ${firstName}! Ваше замовлення прийняте.
Сервіс доставки: ${deliveryService === 'nova_poshta' ? 'Нова Пошта' : 'УкрПошта'}
Відділення: ${branch}
Населений пункт: ${city}
Ми зв’яжемося з вами за телефоном ${phone}.`);

  // Очистити кошик
  cartItems = [];
  localStorage.removeItem('cartItems');
  displayCart();
  updateCartCount();

  // Сховати форму
  document.getElementById('order-form').style.display = 'none';
}

window.onload = displayCart;
</script>
</body>
</html>
