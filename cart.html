<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кошик</title>

<style>
body { font-family: Arial; padding: 40px; background:#f6f6f6; }
h1 { color: #ff4d6d; }

.cart-item { 
  background: white; 
  padding: 15px; 
  margin: 10px 0; 
  border-radius: 10px; 
  display:flex; 
  flex-direction:column;
  gap:15px; 
  box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.cart-header{
  display:flex;
  align-items:center;
  gap:15px;
}

.cart-header img { width: 80px; border-radius: 8px; }

.box-items{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.box-item{
  background:#ffe6f0;
  padding:8px;
  border-radius:8px;
  text-align:center;
}

.box-item img{
  width:40px;
}

.box-item button{
  margin-top:5px;
  padding:3px 6px;
  font-size:12px;
  background:#ff4d6d;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.cart-controls button{
  margin-right:5px;
  padding:5px 10px;
  background:#ff4d6d;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

#total-price {
  font-size:20px;
  font-weight:bold;
  margin-top:20px;
}

button#order {
  margin-top:20px;
  padding:10px 20px;
  background:#ff4d6d;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* Форма */
#order-form {
  display:none;
  margin-top:20px;
  background:white;
  padding:30px;
  border-radius:10px;
}

#order-form input, #order-form select {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>Ваш кошик</h1>

<div id="cart-items"></div>
<div id="total-price"></div>

<button id="order" onclick="orderCart()">Оформити замовлення</button>

<!-- ФОРМА -->
<div id="order-form">
  <h2>Введіть ваші дані</h2>

  <input type="text" id="firstName" placeholder="Ім'я">
  <input type="text" id="lastName" placeholder="Прізвище">
  <input type="tel" id="phone" value="+380" oninput="phoneMask(this)">
  
  <select id="deliveryService">
    <option value="">Оберіть доставку</option>
    <option value="nova_poshta">Нова Пошта</option>
    <option value="ukr_poshta">УкрПошта</option>
  </select>

  <input type="text" id="city" placeholder="Місто">
  <input type="text" id="branch" placeholder="Відділення">

  <button onclick="submitOrder()">Підтвердити</button>
</div>

<script>
let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];

// показ корзины
function displayCart(){
  const container = document.getElementById('cart-items');

  if(cartItems.length === 0){
    container.innerHTML = '<p>Кошик порожній</p>';
    document.getElementById('total-price').innerText = '';
    return;
  }

  container.innerHTML = '';
  let totalSum = 0;

  cartItems.forEach((item, index) => {

    let itemsHTML = '';

    if(item.items){
      item.items.forEach((subItem, subIndex) => {
        itemsHTML += `
  <div class="box-item">
    <img src="${subItem.img}">
    <div>${subItem.name}</div>
    <div>${subItem.price} грн</div>
    ${subItem.name === 'Коробка' ? '' : `<button onclick="removeSubItem(${index}, ${subIndex})">❌</button>`}
  </div>
`;
      });
    }

    let itemTotal = 0;
    if(item.items){
      item.items.forEach(i => itemTotal += i.price);
    } else {
      itemTotal = item.price * item.qty;
    }

    totalSum += itemTotal;

    container.innerHTML += `
      <div class="cart-item">

        <div class="cart-header">
          <img src="${item.img}">
          <div>
            <b>${item.name}</b><br>
            Сума: ${itemTotal} грн
          </div>
        </div>

        ${item.items ? `<div class="box-items">${itemsHTML}</div>` : ''}

        <div class="cart-controls">
          <button onclick="removeItem(${index})">❌ Видалити</button>
        </div>

      </div>
    `;
  });

  document.getElementById('total-price').innerText = "Загальна сума: " + totalSum + " грн";
}

// удалить элемент внутри бокса
function removeSubItem(cartIndex, subIndex){
  cartItems[cartIndex].items.splice(subIndex,1);

  let newPrice = 0;
  cartItems[cartIndex].items.forEach(i => newPrice += i.price);
  cartItems[cartIndex].price = newPrice;

  localStorage.setItem('cartItems', JSON.stringify(cartItems));
  displayCart();
}

// удалить товар
function removeItem(index){
  cartItems.splice(index,1);
  localStorage.setItem('cartItems', JSON.stringify(cartItems));
  displayCart();
}

// открыть форму
function orderCart(){
  if(cartItems.length === 0){
    alert("Кошик порожній!");
    return;
  }
  document.getElementById('order-form').style.display='block';
}

// маска телефона
function phoneMask(input){
  if(!input.value.startsWith('+380')){
    input.value = '+380';
  }
  let numbers = input.value.slice(4).replace(/\D/g,'');
  input.value = '+380' + numbers;
}

// отправка
function submitOrder(){
  const firstName = document.getElementById('firstName').value;
  const lastName = document.getElementById('lastName').value;
  const phone = document.getElementById('phone').value;
  const deliveryService = document.getElementById('deliveryService').value;
  const city = document.getElementById('city').value;
  const branch = document.getElementById('branch').value;

  if(!firstName || !lastName || !phone || !deliveryService || !city || !branch){
    alert("Заповніть всі поля");
    return;
  }

  let itemsText = cartItems.map(item=>{
    if(item.items){
      let sub = item.items.map(i=>`${i.name} (${i.price} грн)`).join(', ');
      return `${item.name}: ${sub}`;
    } else {
      return `${item.name}`;
    }
  }).join('\n');

  const body = {
    firstName,
    lastName,
    phone,
    deliveryService,
    city,
    branch,
    items: itemsText
  };

  fetch("https://hook.eu1.make.com/35ch8ewv61k47c1spwlay6xfnqoeju7n", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });

  alert("Замовлення відправлено!");

  cartItems = [];
  localStorage.removeItem('cartItems');
  displayCart();
}

displayCart();
</script>

</body>
</html>
