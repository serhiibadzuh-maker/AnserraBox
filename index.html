<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brim Dream Box</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f6f6f6;
}
/* Бургер кнопка */
#menu-button {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 26px;
  background: #ff69b4;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  z-index: 1100;
  cursor: pointer;
}
/* Шторка */
#side-menu {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: white;
  box-shadow: 2px 0 10px rgba(0,0,0,0.2);
  padding-top: 80px;
  transition: 0.3s;
  z-index: 1050;
}
#side-menu a {
  display: block;
  padding: 15px 25px;
  text-decoration: none;
  color: #ff4d6d;
  font-weight: bold;
  font-size: 18px;
}
#side-menu a:hover { background: #ffe6f0; }
#side-menu a[href="constructor.html"] { display:none; }
/* Кошик */
#cart-button {
  position: fixed;
  top: 20px;
  left: 80px;
  font-size: 18px;
  background: #ff69b4;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  z-index: 1000;
}
#cart-button a {
  text-decoration: none;
  color: white;
  font-weight: bold;
}
/* HEADER */
header{
  background:white;
  padding:60px;
}
.header-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:60px;
}
.text{
  max-width:500px;
  background: linear-gradient(90deg, #ff69b4, #ff1493);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.text h1{
  font-size:40px;
  margin-bottom:20px;
}
.text p{
  font-size:18px;
  line-height:1.6;
  margin:0;
}
.hero img{
  width:400px;
  border-radius:15px;
}
/* Сортування */
#sort-dropdown{
  display:flex;
  justify-content:flex-end;
  margin:20px 60px 0 60px;
  position:relative;
  z-index:10;
}
#sort-dropdown button{
  padding:10px 20px;
  background:#ff69b4;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
#sort-dropdown-content{
  display:none;
  position:absolute;
  right:0;
  background:white;
  min-width:180px;
  box-shadow:0 0 5px rgba(0,0,0,0.3);
  border-radius:8px;
  overflow:hidden;
}
#sort-dropdown-content button{
  width:100%;
  padding:10px;
  border:none;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
  text-align:left;
}
#sort-dropdown-content button:hover{
  background:#ffe6f0;
}
/* Товари */
.product {
  display:flex;
  align-items:flex-start;
  gap:20px;
  margin:20px 60px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.product img{
  width:200px;
  border-radius:10px;
  object-fit:contain;
}
.product-info{
  flex:1;
  display:flex;
  flex-direction:column;
}
.product-info h2{
  margin:0 0 10px 0;
  font-size:24px;
}
.product-info p{
  margin:0 0 15px 0;
  font-size:16px;
}
.product-info .price{
  font-weight:bold;
  font-size:18px;
  color:black;
  margin-bottom:10px;
}
/* Кнопка купити */
.product-info button{
  padding:10px 20px;
  background:#ff4d6d;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  width:auto;
  text-align:center;
  align-self:flex-start;
}
/* Мобільная версия */
@media (max-width:768px){
  header{padding:60px 20px 40px 20px;}
  .header-content{flex-direction:column; align-items:center; text-align:center; gap:20px;}
  .text h1{font-size:24px;margin-top:20px;}
  .text p{font-size:16px;}
  #sort-dropdown{margin:10px 20px;}
  .hero img{width:84%; max-width:360px;}
  .product{
    flex-direction:column;
    text-align:center;
  }
  .product img{
    width:80%;
    max-width:300px;
    margin:0 auto; /* Центруем изображение */
    display:block;
  }
  .product-info{width:100%;}
}
/* Анимация */
.flying-img{
  position:fixed;
  width:50px;
  height:50px;
  border-radius:10px;
  transition: all 0.8s ease-in-out;
  z-index:2000;
}
</style>
</head>
<body>

<div id="menu-button" onclick="toggleMenu()">☰</div>
<div id="side-menu">
  <a href="index.html">Меню</a>
  <a href="constructor.html">Конструктор боксу</a>
</div>

<div id="cart-button">
  <a href="cart.html">Кошик 🛒: <span id="cart-count">0</span></a>
</div>

<header>
  <div class="header-content">
    <div class="text">
      <h1>Brim Dream Box</h1>
      <p>Привіт! Ми — Brim Dream Box, і ми тут, щоб кожен твій подарунок дарував посмішку.<br>
      У нас є все для суперподарунка на будь-яке свято.<br>
      Все вже готово — просто замовляй, а ми подбаємо про решту!</p>
    </div>
    <div class="hero">
      <img src="gift.jpg.png" alt="Подарунок">
    </div>
  </div>
</header>

<div id="sort-dropdown">
  <button onclick="toggleSort()">Сортувати ▼</button>
  <div id="sort-dropdown-content">
    <button onclick="sortProducts('asc'); toggleSort()">Від дешевих до дорогих</button>
    <button onclick="sortProducts('desc'); toggleSort()">Від дорогих до дешевих</button>
  </div>
</div>

<div id="products-container">
<!-- Товари генеруються скриптом -->
</div>

<script>
const productsData = [
  {name:"Бокс №1", img:"images_index/bokc1.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №2", img:"images_index/bokc2.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"},
  {name:"Бокс №3", img:"images_index/bokc3.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №4", img:"images_index/bokc4.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"},
  {name:"Бокс №5", img:"images_index/bokc5.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №6", img:"images_index/bokc6.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"},
  {name:"Бокс №7", img:"images_index/bokc7.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №8", img:"images_index/bokc8.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"},
  {name:"Бокс №9", img:"images_index/bokc9.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №10", img:"images_index/bokc10.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"},
  {name:"Бокс №11", img:"images_index/bokc11.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №12", img:"images_index/bokc12.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"},
  {name:"Бокс №13", img:"images_index/bokc13.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №14", img:"images_index/bokc14.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"},
  {name:"Бокс №15", img:"images_index/bokc15.png.jpg", price:600, desc:"Чашка, ложечка, чай, свічка, шкарпетки, крем, цукерки, букетик сухоцвітів, листівка"},
  {name:"Бокс №16", img:"images_index/bokc16.png.webp", price:650, desc:"Чашка, блокнот, ручка, свічка, шоколад, маленький букетик, листівка"}
];

const container = document.getElementById('products-container');
productsData.forEach(p=>{
  const div = document.createElement('div');
  div.className = 'product';
  div.dataset.price = p.price;
  div.innerHTML = `
    <img src="${p.img}" alt="${p.name}">
    <div class="product-info">
      <h2>${p.name}</h2>
      <p>${p.desc}</p>
      <div class="price">Ціна: ${p.price} грн</div>
      <button onclick="addToCart('${p.name}','${p.img}',${p.price},this)">Купити</button>
    </div>
  `;
  container.appendChild(div);
});

function toggleMenu(){
  const menu = document.getElementById('side-menu');
  menu.style.left = (menu.style.left==='0px') ? '-250px' : '0px';
}

function updateCartCount(){
  let cartCount = 0;
  if(localStorage.getItem('cartItems')){
    let saved = JSON.parse(localStorage.getItem('cartItems'));
    cartCount = saved.reduce((s,i)=>s+i.qty,0);
  }
  document.getElementById('cart-count').innerText = cartCount;
}

function addToCart(name,img,price,btn){
  let cart = localStorage.getItem('cartItems')?JSON.parse(localStorage.getItem('cartItems')):[];
  let found = cart.find(x=>x.name===name);
  if(found) found.qty++; else cart.push({name,img,price,qty:1});
  localStorage.setItem('cartItems',JSON.stringify(cart));
  updateCartCount();
  const imgEl = btn.closest('.product').querySelector('img');
  const flying = imgEl.cloneNode(true);
  flying.classList.add('flying-img');
  document.body.appendChild(flying);
  const rect = imgEl.getBoundingClientRect();
  flying.style.left = rect.left + 'px';
  flying.style.top = rect.top + 'px';
  const cartRect = document.getElementById('cart-button').getBoundingClientRect();
  setTimeout(()=>{flying.style.left=cartRect.left+'px'; flying.style.top=cartRect.top+'px'; flying.style.width='30px'; flying.style.height='30px'; flying.style.opacity='0.5';},10);
  setTimeout(()=>document.body.removeChild(flying),900);
}

function toggleSort(){
  const content = document.getElementById('sort-dropdown-content');
  content.style.display = content.style.display==='block'?'none':'block';
}

function sortProducts(order){
  const products = Array.from(document.getElementById('products-container').children);
  products.sort((a,b)=> order==='asc'?a.dataset.price-b.dataset.price:b.dataset.price-a.dataset.price);
  products.forEach(p=>document.getElementById('products-container').appendChild(p));
}

updateCartCount();
</script>

</body>
</html>
